name: Deploy to Stage

env:
  CONTEXT_DIR: "./"
  IMAGE_NAME: ${{ github.repository }}/stage
  DOCKERFILE: Dockerfile
  DOCKER_REGISTRY: ghcr.io

on:
  push:
    branches:
      - develop

jobs:
  build-and-publish-stage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "IMAGE_NAME_WITH_REGISTRY=$DOCKER_REGISTRY/$IMAGE_NAME" >> $GITHUB_ENV
          export IMAGE_NAME_WITH_REGISTRY=$DOCKER_REGISTRY/$IMAGE_NAME
          echo "FULL_IMAGE_NAME=$IMAGE_NAME_WITH_REGISTRY:$GITHUB_SHA-gitsha" >> $GITHUB_ENV
          echo "CAPROVER_GIT_COMMIT_SHA=$GITHUB_SHA" >> $GITHUB_ENV
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Make script executable
        run: chmod +x ./scripts/build-and-push-github-caprover.sh
      - name: Build and Push Release to DockerHub
        shell: bash
        run: ./scripts/build-and-push-github-caprover.sh
      - name: Deploy to CapRover - cinema-cron
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_ML_SERVER }}
          app: cinema-cron
          token: "${{ secrets.CINEMA_CAPROVER_TOKEN }}"
          image: "${{ env.FULL_IMAGE_NAME }}"
      - name: Deploy to CapRover - lpos-stage
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_ML_SERVER }}
          app: lpos-stage
          token: "${{ secrets.CAPROVER_TOKEN }}"
          image: "${{ env.FULL_IMAGE_NAME }}"
