version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DB_MAIN: $DB_MAIN
        PORT: $PORT
        NEXT_PUBLIC_UPLOAD_ENDPOINT: $NEXT_PUBLIC_UPLOAD_ENDPOINT
        NEXT_PULBIC_UPLOAD_DOMAIN: $NEXT_PULBIC_UPLOAD_DOMAIN
    ports:
      - "$PORT:$PORT" # host:container
    environment:
      NODE_ENV: production
      PORT: $PORT
      DB_MAIN: $DB_MAIN
      UPLOAD_ENDPOINT: $UPLOAD_ENDPOINT
      NEXT_PUBLIC_UPLOAD_ENDPOINT: $NEXT_PUBLIC_UPLOAD_ENDPOINT
      NEXT_PULBIC_UPLOAD_DOMAIN: $NEXT_PULBIC_UPLOAD_DOMAIN
      MINIO_KEY: $MINIO_KEY
      MINIO_SECRET: $MINIO_SECRET
      PATH_UPLOAD: $PATH_UPLOAD
      MAIL_SERVER: $MAIL_SERVER
      SKIP_EMAIL: $SKIP_EMAIL
      TZ: $TZ
    restart: always
    # Removed command override — lets Dockerfile CMD (start.sh) run the standalone server
